  <div class="contact-modal" id="contactModal">
    <div class="modal-content">
      <span class="close-modal" id="closeModal">&times;</span>

      <h3>Contact SmartLife</h3>
      
      <form class="contact-form" id="contactForm">
        <input type="text" name="name" placeholder="Your Full Name" required/>
        <input type="email" name="email" placeholder="Your Email" required/>
        <input type="tel" name="tel" placeholder="Your Phone"/>
        <input type="text" name="institution" placeholder="Your Institution"/>
        <label for="level">Year of Study</label>
        <input list="years" name="years" id="year" placeholder="--Select an option--" />
        <datalist id="years">
          <option value="1st Year">
          <option value="2nd Year">
          <option value="3rd Year">
          <option value="4th Year">
        </datalist>
        <textarea name="message" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
        <p class="form-status"></p>
      </form>
      </div>
  </div>
